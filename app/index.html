<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website Template</title>
    <style>
        /* Basic Styling */
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; line-height: 1.6; }
        header { background: #333; color: #fff; padding: 1rem 0; text-align: center; }
        nav { display: flex; justify-content: center; background: #444; }
        nav a { color: white; padding: 14px 20px; text-decoration: none; }
        nav a:hover { background: #555; }
        .hero { background: #f4f4f4; padding: 50px; text-align: center; }
        .container { padding: 20px; max-width: 1000px; margin: auto; }
        footer { background: #333; color: #fff; text-align: center; padding: 1rem 0; position: relative; bottom: 0; width: 100%; }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Website</h1>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
	<a href="#">Achivements</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <section class="hero">
        <h2>Simple & Clean Design</h2>
        <p>This is a basic HTML5 template you can use to start any project.</p>
        <button style="padding: 10px 20px; cursor: pointer;">Learn More</button>
    </section>

    <div class="container">
        <h3>Main Content Area</h3>
        <p>Add your text, images, and other elements here. This section is responsive and centered.</p>
    </div>

    <footer>
        <p>&copy; 2024 SKR . All Rights Reserved.</p>
    </footer>

</body>
</html>
